data:
  train_jsonl: dataset/archive/train.jsonl
  val_jsonl: dataset/archive/val.jsonl
  test_jsonl: dataset/archive/test.jsonl
  max_length: 512
  num_workers: 0
tasks:
  seq2struct: 0.35
  invfold: 0.25
  inpaint: 0.25
  motif_control: 0.15
model:
  hidden_size: 512
  num_layers: 8
  num_heads: 8
  dropout: 0.1
  max_position_embeddings: 2048
  pairhead: mlp
  pairhidden: 512
  pairdrop: 0.1
  distbias: true
  distbuckets: 32
  distmax: 512
training:
  batch_size: 8
  epochs: 20
  lr: 0.0001
  weight_decay: 0.01
  warmup_steps: 500
  lambdaPair: 10.0
  pairWeight: 20.0
  pairRatio: 5
  pairUpper: true
  pairLoop: 3
  pairDiag: false
  pairFloat: true
  lambda_struct: 1.0
  lambda_seq: 1.0
  amp: true
  seed: 42
  out: outputs/strong
  output_dir: outputs/strong
  save_best_by: val_pair_f1
  early_stopping_patience: 10
  min_delta: 0.0001
  log_every: 20
decoding:
  num_steps: 32
  min_loop_length: 3
  use_nussinov: true
  allow_wobble: true
  source: pair
  threshold: 0.3
  gamma: 2.0
baselines:
  run_all_dot: true
  run_random_pair: true
  run_rnafold: false
debug:
  check_pair_batch: false
