data:
  train_jsonl: dataset/archive/train.jsonl
  val_jsonl: dataset/archive/val.jsonl
  test_jsonl: dataset/archive/test.jsonl
  max_length: 512
  num_workers: 0
  length_grouping: false
  length_bucket_size: 50

tasks:
  seq2struct: 0.35
  invfold: 0.25
  inpaint: 0.25
  motif_control: 0.15

model:
  hidden_size: 512
  num_layers: 8
  num_heads: 8
  dropout: 0.1
  max_position_embeddings: 2048
  pairhead: mlp
  pairhidden: 512
  pairdrop: 0.1
  distbias: false
  distbuckets: 32
  distmax: 512
  invalidlogit: -20.0

training:
  batch_size: 8
  epochs: 20
  lr: 0.0001
  weight_decay: 0.01
  warmup_steps: 500
  lambda_pair: 5.0
  lambdaPair: 5.0
  lambda_struct: 1.0
  lambda_seq: 1.0
  pair_negative_ratio: 3
  pairRatio: 3
  pair_positive_weight: 10.0
  pairWeight: 10.0
  pairUpper: true
  pairLoop: 3
  pairDiag: false
  pairFloat: true
  structure_positive_weight: 5.0
  grad_clip: 1.0
  amp: true
  seed: 42
  output_dir: outputs/fix
  out: outputs/fix
  save_best_by: val_pair_f1
  early_stopping_patience: 10
  min_delta: 0.0001
  resume_from: null
  log_every: 20

decoding:
  num_steps: 32
  min_loop_length: 3
  use_nussinov: true
  allow_wobble: true
  decode_source: pair
  source: pair
  pair_threshold: 0.5
  threshold: 0.5
  nussinov_gamma: 1.0
  gamma: 1.0
  topk_pairs: 20

ablation:
  use_pair_head: true
  use_pair_loss: true
  use_nussinov: true
  use_pair_aware_masking: true
  use_motif_span_masking: true
  use_motif_condition: true
  use_family_condition: true
  decode_source: pair

baselines:
  run_all_dot: true
  run_random_pair: true
  run_rnafold: false
  rnafold_bin: RNAfold

debug:
  check_pair_batch: false
