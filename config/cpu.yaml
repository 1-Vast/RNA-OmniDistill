data:
  train_jsonl: dataset/archive/train.jsonl
  val_jsonl: dataset/archive/val.jsonl
  test_jsonl: dataset/archive/test.jsonl
  max_length: 128
  num_workers: 0
tasks:
  seq2struct: 0.35
  invfold: 0.25
  inpaint: 0.25
  motif_control: 0.15
model:
  hidden_size: 64
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  max_position_embeddings: 512
  pairhead: bilinear
  distbias: false
training:
  batch_size: 2
  epochs: 2
  lr: 0.0001
  lambdaPair: 0.5
  pairWeight: auto
  pairRatio: 3
  pairUpper: true
  pairLoop: 3
  pairDiag: false
  pairFloat: true
  lambda_struct: 1.0
  lambda_seq: 1.0
  amp: false
  seed: 42
  out: outputs/cpu
  output_dir: outputs/cpu
  save_best_by: val_pair_f1
  log_every: 1
decoding:
  num_steps: 4
  min_loop_length: 3
  use_nussinov: true
  allow_wobble: true
  source: pair
  threshold: 0.5
  gamma: 1.0
baselines:
  run_all_dot: true
  run_random_pair: true
debug:
  check_pair_batch: false
