data:
  train_jsonl: dataset/processed_rnastralign512/train.jsonl
  val_jsonl: dataset/processed_rnastralign512/val.jsonl
  test_jsonl: dataset/processed_archiveii/clean.checked.jsonl
  max_length: 512
  num_workers: 0
  deduplicate: true
  dedup_by: seq_struct
  length_grouping: false
  length_bucket_size: 50

tasks:
  seq2struct: 0.35
  invfold: 0.25
  inpaint: 0.25
  motif_control: 0.15

model:
  hidden_size: 512
  num_layers: 8
  num_heads: 8
  dropout: 0.1
  max_position_embeddings: 2048

training:
  batch_size: 8
  epochs: 20
  lr: 0.0001
  weight_decay: 0.01
  warmup_steps: 500
  lambda_pair: 0.5
  lambda_struct: 1.0
  lambda_seq: 1.0
  pair_negative_ratio: 3
  pair_positive_weight: auto
  structure_positive_weight: auto
  grad_clip: 1.0
  amp: true
  seed: 42
  output_dir: outputs/rnastralign512_full
  save_best_by: val_pair_f1
  early_stopping_patience: 10
  min_delta: 0.0001
  resume_from: null
  log_every: 20

decoding:
  num_steps: 32
  min_loop_length: 3
  use_nussinov: true
  allow_wobble: true
  decode_source: pair
  pair_threshold: 0.5
  nussinov_gamma: 1.0
  topk_pairs: 20

ablation:
  use_pair_head: true
  use_pair_loss: true
  use_nussinov: true
  use_pair_aware_masking: true
  use_motif_span_masking: true
  use_motif_condition: true
  use_family_condition: true
  decode_source: pair

baselines:
  run_all_dot: true
  run_random_pair: true
  run_rnafold: false
  rnafold_bin: RNAfold

debug:
  check_pair_batch: false

