# Smoke config for LLM-guided relational curriculum pretraining.
# DO NOT use as default. This is a temporary experiment config.
# Based on: config/seq_pretrain_rnafm.yaml

data:
  train_jsonl: dataset/processed/rfam/rfam_fasta_seq_50k.jsonl
  val_jsonl: dataset/processed/rfam/rfam_fasta_seq_50k.jsonl
  allow_unlabeled: true
  use_curriculum_policy: false
  max_length: 512
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  length_grouping: true
  length_bucket_size: 50

tasks:
  seq_denoise: 1.0

model:
  hidden_size: 512
  num_layers: 8
  num_heads: 8
  dropout: 0.1
  max_position_embeddings: 2048
  use_distill_head: true
  teacher_dim: 640
  distill_pool: mean

training:
  batch_size: 64
  epochs: 1
  lr: 0.0001
  weight_decay: 0.01
  warmup_steps: 10
  lambda_seq: 1.0
  lambda_struct: 0.0
  lambda_pair: 0.0
  lambda_distill: 0.05
  grad_clip: 1.0
  amp: true
  seed: 42
  output_dir: experiments_tmp/llm_curriculum/outputs/seq_pretrain_smoke
  save_best_by: val_loss
  early_stopping_patience: 3
  min_delta: 0.0001
  log_every: 5
  train_decode_structures: false
  val_decode_samples: 0
  val_max_batches: 2

decoding:
  use_nussinov: false
  decode_source: token

ablation:
  use_pair_head: false
  use_pair_loss: false
  use_nussinov: false
  use_curriculum_policy: false
